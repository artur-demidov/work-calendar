<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Расписание рабочих дней</title>
  <style>
    /* Only CSS variable used for dynamic column count */
    :root { --cols: 31; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f0f0f0;
      color: #111;
      min-height: 100vh;
      padding: 24px;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .page-header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .page-header .subtitle {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .month-nav button {
      width: 26px;
      height: 26px;
      border: 1px solid #aaa;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s;
    }

    .month-nav button:hover { background: #111; color: #fff; border-color: #111; }

    .month-label {
      font-size: 12px;
      font-weight: 600;
      min-width: 120px;
      text-align: center;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .btn {
      height: 26px;
      padding: 0 10px;
      border: 1px solid #aaa;
      background: #fff;
      cursor: pointer;
      font-size: 11px;
      font-family: sans-serif;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #111;
      transition: background 0.12s, color 0.12s;
    }

    .btn:hover { background: #111; color: #fff; border-color: #111; }
    .btn-print { background: #111; color: #fff; border-color: #111; }
    .btn-print:hover { background: #000; }

    /* ── LEGEND ── */
    .legend {
      display: flex;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #555;
    }

    /* ── GRID WRAPPER ── */
    .grid-wrapper {
      overflow-x: auto;
      background: #fff;
      border: 1px solid #aaa;
    }

    /*
      Column layout:
        col 1  — fixed 160px  — employee name
        col 2…N+1 — 1fr each  — day cells (stretch to fill width)
        col N+2 — fixed 42px  — summary (worked days count)
    */
    .grid-row {
      display: grid;
      grid-template-columns: 160px repeat(var(--cols), 1fr) 42px;
    }

    /* ── CELL BASE ── */
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #ddd;
    }

    .cell:last-child { border-right: none; }

    .cell-name {
      justify-content: flex-start;
      padding: 0 10px;
      border-right: 2px solid #aaa;
      overflow: hidden;
    }

    .cell-day { min-height: 30px; }

    .cell-summary {
      border-left: 2px solid #aaa;
      border-right: none;
      font-size: 11px;
      font-weight: 600;
      color: #111;
    }

    /* ── HEADER & FOOTER ROWS (shared style) ── */
    .grid-header,
    .grid-footer {
      background: #fff;
      border-bottom: 2px solid #aaa;
    }

    .grid-footer {
      border-top: 2px solid #aaa;
      border-bottom: none;
    }

    .grid-header .cell,
    .grid-footer .cell {
      font-size: 10px;
      font-weight: 600;
      color: #111;
      padding: 5px 0;
      border-right-color: #ddd;
      user-select: none;
      line-height: 1.3;
      text-align: center;
      flex-direction: column;
    }

    .grid-header .cell-name,
    .grid-footer .cell-name {
      text-align: left;
      padding: 5px 10px;
      font-size: 10px;
      color: #555;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-right: 2px solid #aaa;
      justify-content: flex-start;
    }

    .grid-header .cell-summary,
    .grid-footer .cell-summary {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      color: #555;
      letter-spacing: 0.03em;
      text-align: center;
      line-height: 1.3;
    }

    /* ── BODY ROWS ── */
    .grid-body-row {
      border-bottom: 1px solid #e0e0e0;
      transition: background 0.1s;
    }

    .grid-body-row:hover { background: #f8f8f8; }

    .grid-body-row .cell-name input {
      border: none;
      background: transparent;
      font-size: 12px;
      font-family: sans-serif;
      color: #111;
      width: 100%;
      outline: none;
      cursor: text;
    }

    .grid-body-row .cell-name input::placeholder { color: #aaa; font-style: italic; }

    .grid-body-row .cell-day {
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      transition: background 0.1s;
    }

    .grid-body-row .cell-day:hover { background: #eee; }

    /* ── ADD ROW BTN ── */
    .add-row-btn { display: none; }

    /* ── POPUP ── */
    .popup {
      display: none;
      position: fixed;
      z-index: 100;
      background: #fff;
      border: 1px solid #aaa;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 5px;
      gap: 3px;
      flex-direction: column;
    }

    .popup.visible { display: flex; }

    .popup-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      cursor: pointer;
      border: 1px solid transparent;
      font-size: 11px;
      font-family: sans-serif;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: background 0.1s;
    }

    .popup-option:hover { background: #f5f5f5; border-color: #ddd; }
    .popup-option .pop-emoji { font-size: 15px; }

    .popup-clear {
      margin-top: 2px;
      padding-top: 6px;
      border-top: 1px solid #e0e0e0;
      font-size: 10px;
    }

    .popup-fill {
      margin-top: 2px;
      padding-top: 6px;
      border-top: 1px solid #e0e0e0;
      color: #111;
      font-weight: 600;
    }

    /* ── PATTERN BAR ── */
    .pattern-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .pattern-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #444;
    }

    .pattern-field {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pattern-field label {
      font-size: 11px;
      color: #555;
    }

    .pattern-field input {
      width: 48px;
      height: 26px;
      border: 1px solid #aaa;
      background: #fff;
      font-size: 13px;
      font-family: sans-serif;
      font-weight: 600;
      text-align: center;
      color: #111;
      outline: none;
      padding: 0 4px;
    }

    .pattern-field input:focus { border-color: #111; }

    .pattern-hint {
      font-size: 11px;
      color: #999;
    }

    @media print {
      .pattern-bar { display: none !important; }
    }
    @media print {
      @page { size: A4 landscape; margin: 8mm; }

      body { background: #fff; padding: 0; }

      .controls, .legend, .add-row-btn, .popup { display: none !important; }

      .page-header { margin-bottom: 6px; }

      .grid-wrapper { border: 1px solid #888; overflow: visible; }

      .grid-header .cell,
      .grid-footer .cell { font-size: 8px; padding: 3px 0; }

      .cell-day { min-height: 20px; font-size: 11px; }

      .grid-body-row .cell-name input { font-size: 9px; }

      .grid-body-row:hover { background: transparent !important; }
    }
  </style>
</head>
<body>

<div class="page-header">
  <div>
    <h1>Расписание рабочих дней</h1>
    <div class="subtitle" id="subtitleDate"></div>
  </div>
  <div class="controls">
    <div class="month-nav">
      <button id="prevMonth">&#8592;</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextMonth">&#8594;</button>
    </div>
    <button class="btn" id="addRowBtn">+ Сотрудник</button>
    <button class="btn" id="saveEmployeesBtn">💾 Сотрудников</button>
    <button class="btn" id="saveMonthBtn">💾 Месяц</button>
    <button class="btn btn-print" onclick="window.print()">⎙ Печать</button>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><span style="font-size:14px">✅</span> Рабочий день</div>
  <div class="legend-item"><span style="font-size:14px">🏖️</span> Отпуск</div>
  <div class="legend-item"><span style="font-size:14px">🤒</span> Больничный</div>
</div>

<div class="grid-wrapper" id="gridWrapper">
  <button class="add-row-btn" id="addRowBtn2">+ Добавить сотрудника</button>
</div>

<div class="pattern-bar">
  <span class="pattern-label">Паттерн:</span>
  <div class="pattern-field">
    <label>Рабочих (X)</label>
    <input type="number" id="patternX" value="5" min="1" max="31">
  </div>
  <div class="pattern-field">
    <label>Выходных (Y)</label>
    <input type="number" id="patternY" value="2" min="0" max="31">
  </div>
  <span class="pattern-hint">Кликните на ячейку дня → «Заполнить» — применит паттерн с этого дня до конца месяца</span>
</div>

<div class="popup" id="popup">
  <div class="popup-option" data-val="✅"><span class="pop-emoji">✅</span> Рабочий день</div>
  <div class="popup-option" data-val="🏖️"><span class="pop-emoji">🏖️</span> Отпуск</div>
  <div class="popup-option" data-val="🤒"><span class="pop-emoji">🤒</span> Больничный</div>
  <div class="popup-option popup-clear" data-val=""><span class="pop-emoji">✕</span> Очистить</div>
  <div class="popup-option popup-fill" id="popupFill"><span class="pop-emoji">⚡</span> Заполнить</div>
</div>

<script>
  const MONTHS_RU  = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const DOW_SHORT  = ['вс','пн','вт','ср','чт','пт','сб'];

  let currentYear, currentMonth;
  let employees = [
    { name: 'Иванов Иван Иванович',     days: {} },
    { name: 'Петрова Мария Сергеевна',  days: {} },
    { name: 'Сидоров Алексей Петрович', days: {} },
  ];

  const today = new Date();
  const getDaysInMonth = (y, m) => new Date(y, m + 1, 0).getDate();
  const getDow         = (y, m, d) => new Date(y, m, d).getDay();

  function setCols(n) {
    document.documentElement.style.setProperty('--cols', n);
  }

  /* ── BUILD ENTIRE GRID ── */
  function buildGrid() {
    const days    = getDaysInMonth(currentYear, currentMonth);
    const wrapper = document.getElementById('gridWrapper');
    const addBtn  = document.getElementById('addRowBtn2');

    setCols(days);
    wrapper.querySelectorAll('.grid-row').forEach(el => el.remove());

    wrapper.insertBefore(makeHeaderRow(days), addBtn);
    employees.forEach((emp, ei) => wrapper.insertBefore(makeBodyRow(emp, ei, days), addBtn));
    wrapper.insertBefore(makeFooterRow(days), addBtn);

    document.getElementById('monthLabel').textContent   = `${MONTHS_RU[currentMonth]} ${currentYear}`;
    document.getElementById('subtitleDate').textContent = `${MONTHS_GEN[currentMonth]} ${currentYear} · ${days} дней`;
  }

  /* ── HEADER ROW ── */
  function makeHeaderRow(days) {
    const row = mkDiv('grid-row grid-header');
    row.appendChild(mkCell('cell cell-name', 'Сотрудник'));
    for (let d = 1; d <= days; d++) {
      const dow  = getDow(currentYear, currentMonth, d);
      const cell = mkCell('cell cell-day');
      cell.innerHTML = `<span style="display:block;font-size:12px;font-weight:600;line-height:1.3">${d}</span><span style="display:block;font-size:10px;font-weight:400;opacity:0.55;line-height:1.3">${DOW_SHORT[dow]}</span>`;
      row.appendChild(cell);
    }
    row.appendChild(mkCell('cell cell-summary'));
    return row;
  }

  /* ── BODY ROW ── */
  function makeBodyRow(emp, ei, days) {
    const row = mkDiv('grid-row grid-body-row');
    row.dataset.ei = ei;

    const nameCell = mkDiv('cell cell-name');
    const inp = document.createElement('input');
    inp.type        = 'text';
    inp.value       = emp.name;
    inp.placeholder = 'Имя сотрудника';
    inp.title       = 'Двойной клик — удалить сотрудника';
    inp.addEventListener('change', () => { employees[ei].name = inp.value; });
    inp.addEventListener('dblclick', e => {
      e.stopPropagation();
      if (employees.length <= 1) return;
      if (confirm(`Удалить сотрудника "${emp.name || 'без имени'}"?`)) {
        employees.splice(ei, 1);
        buildGrid();
      }
    });
    nameCell.appendChild(inp);
    row.appendChild(nameCell);

    for (let d = 1; d <= days; d++) {
      const key  = `${currentYear}-${currentMonth}-${d}`;
      const cell = mkCell('cell cell-day');
      cell.dataset.key = key;
      cell.dataset.ei  = ei;
      cell.textContent = emp.days[key] || '';
      cell.addEventListener('click', e => openPopup(e, ei, key, cell));
      row.appendChild(cell);
    }

    // Summary cell — worked days count
    const sumCell = mkCell('cell cell-summary');
    sumCell.dataset.summaryEi = ei;
    sumCell.textContent = countWorkedDays(ei, days);
    row.appendChild(sumCell);

    return row;
  }

  /* ── FOOTER ROW (mirrors header) ── */
  function makeFooterRow(days) {
    const row = mkDiv('grid-row grid-footer');
    row.appendChild(mkCell('cell cell-name', 'Сотрудник'));
    for (let d = 1; d <= days; d++) {
      const dow  = getDow(currentYear, currentMonth, d);
      const cell = mkCell('cell cell-day');
      cell.innerHTML = `<span style="display:block;font-size:12px;font-weight:600;line-height:1.3">${d}</span><span style="display:block;font-size:10px;font-weight:400;opacity:0.55;line-height:1.3">${DOW_SHORT[dow]}</span>`;
      row.appendChild(cell);
    }
    row.appendChild(mkCell('cell cell-summary'));
    return row;
  }

  /* ── COUNT WORKED DAYS FOR ONE EMPLOYEE ── */
  function countWorkedDays(ei, days) {
    days = days || getDaysInMonth(currentYear, currentMonth);
    let count = 0;
    for (let d = 1; d <= days; d++) {
      if (employees[ei].days[`${currentYear}-${currentMonth}-${d}`] === '✅') count++;
    }
    return count > 0 ? count : '';
  }

  /* ── UPDATE SUMMARY CELL AFTER POPUP ── */
  function updateSummaryCell(ei) {
    const cell = document.querySelector(`[data-summary-ei="${ei}"]`);
    if (cell) cell.textContent = countWorkedDays(ei);
  }

  /* ── HELPERS ── */
  function mkDiv(cls) {
    const el = document.createElement('div');
    if (cls) el.className = cls;
    return el;
  }

  function mkCell(cls, text) {
    const el = mkDiv(cls);
    if (text !== undefined) el.textContent = text;
    return el;
  }

  /* ── POPUP ── */
  let activeCell = null;
  const popup = document.getElementById('popup');

  function openPopup(e, ei, key, cell) {
    e.stopPropagation();
    activeCell = { ei, key, cell };
    const rect = cell.getBoundingClientRect();
    const pw = 178, ph = 178;
    let left = rect.left + window.scrollX;
    let top  = rect.bottom + window.scrollY + 2;
    if (left + pw > window.innerWidth  + window.scrollX - 8) left = window.innerWidth  + window.scrollX - pw - 8;
    if (top  + ph > window.innerHeight + window.scrollY - 8) top  = rect.top + window.scrollY - ph - 2;
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';
    popup.classList.add('visible');
  }

  popup.querySelectorAll('.popup-option:not(#popupFill)').forEach(opt => {
    opt.addEventListener('click', e => {
      e.stopPropagation();
      if (!activeCell) return;
      employees[activeCell.ei].days[activeCell.key] = opt.dataset.val;
      activeCell.cell.textContent = opt.dataset.val;
      updateSummaryCell(activeCell.ei);
      popup.classList.remove('visible');
      activeCell = null;
    });
  });

  document.getElementById('popupFill').addEventListener('click', e => {
    e.stopPropagation();
    if (!activeCell) return;
    const ei     = activeCell.ei;
    const startD = parseInt(activeCell.key.split('-')[2]);
    const x      = Math.max(1, parseInt(document.getElementById('patternX').value) || 5);
    const y      = Math.max(0, parseInt(document.getElementById('patternY').value) || 2);
    const total  = getDaysInMonth(currentYear, currentMonth);

    let pos = 0;
    for (let d = startD; d <= total; d++) {
      const key = `${currentYear}-${currentMonth}-${d}`;
      employees[ei].days[key] = pos < x ? '✅' : '';
      pos = (pos + 1) % (x + y);
    }

    const row = document.querySelector(`.grid-body-row[data-ei="${ei}"]`);
    if (row) {
      row.querySelectorAll('.cell-day').forEach(cell => {
        const k = cell.dataset.key;
        if (k) cell.textContent = employees[ei].days[k] || '';
      });
    }
    updateSummaryCell(ei);
    popup.classList.remove('visible');
    activeCell = null;
  });

  document.addEventListener('click', () => { popup.classList.remove('visible'); activeCell = null; });

  /* ── ADD EMPLOYEE ── */
  function addEmployee() {
    employees.push({ name: '', days: {} });
    buildGrid();
    setTimeout(() => {
      const inputs = document.querySelectorAll('.grid-body-row .cell-name input');
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 50);
  }

  document.getElementById('addRowBtn').addEventListener('click', addEmployee);
  document.getElementById('addRowBtn2').addEventListener('click', addEmployee);

  /* ── MONTH NAV ── */
  document.getElementById('prevMonth').addEventListener('click', () => {
    if (--currentMonth < 0) { currentMonth = 11; currentYear--; }
    buildGrid();
  });

  document.getElementById('nextMonth').addEventListener('click', () => {
    if (++currentMonth > 11) { currentMonth = 0; currentYear++; }
    buildGrid();
  });

  /* ── LOCALSTORAGE ── */
  const LS_EMPLOYEES = 'schedule_employees';
  const LS_MONTH     = 'schedule_month_data';

  function saveEmployees() {
    const names = employees.map(e => e.name);
    localStorage.setItem(LS_EMPLOYEES, JSON.stringify(names));
    showToast('Сотрудники сохранены');
  }

  function loadEmployees() {
    try {
      const raw = localStorage.getItem(LS_EMPLOYEES);
      if (!raw) return false;
      const names = JSON.parse(raw);
      if (!Array.isArray(names) || names.length === 0) return false;
      employees = names.map(name => ({ name, days: {} }));
      return true;
    } catch { return false; }
  }

  function saveMonth() {
    const data = {
      year: currentYear,
      month: currentMonth,
      employees: employees.map(e => ({ name: e.name, days: { ...e.days } }))
    };
    localStorage.setItem(LS_MONTH, JSON.stringify(data));
    showToast(`Данные за ${MONTHS_GEN[currentMonth]} ${currentYear} сохранены`);
  }

  function loadMonth() {
    try {
      const raw = localStorage.getItem(LS_MONTH);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (data.year !== currentYear || data.month !== currentMonth) return false;
      // Merge days into existing employees matched by name, or restore fully
      data.employees.forEach(saved => {
        const emp = employees.find(e => e.name === saved.name);
        if (emp) emp.days = saved.days;
      });
      return true;
    } catch { return false; }
  }

  /* ── TOAST ── */
  function showToast(msg) {
    let toast = document.getElementById('toast');
    if (!toast) {
      toast = document.createElement('div');
      toast.id = 'toast';
      toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-family:sans-serif;font-size:12px;padding:8px 18px;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:999;letter-spacing:0.04em';
      document.body.appendChild(toast);
    }
    toast.textContent = msg;
    toast.style.opacity = '1';
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { toast.style.opacity = '0'; }, 2000);
  }

  document.getElementById('saveEmployeesBtn').addEventListener('click', saveEmployees);
  document.getElementById('saveMonthBtn').addEventListener('click', saveMonth);

  /* ── INIT ── */
  currentYear  = today.getFullYear();
  currentMonth = today.getMonth();
  // Restore employees from localStorage if available
  loadEmployees();
  buildGrid();
  // Restore month data if saved month matches current
  if (loadMonth()) buildGrid();
</script>
</body>
</html>
